[package]
name = "by-macros"
version = "0.6.20"
edition = "2021"
description = "Biyard Macros"
license = "Apache-2.0"
keywords = ["macros", "api"]
repository = "https://github.com/biyard/rust-sdk/tree/main/packages/by-macros"

[lib]
proc-macro = true

[dependencies]
Inflector = "0.11"
bigdecimal = "0.4.7"
convert_case = "0.7.1"
indexmap = "2.7.1"
proc-macro2 = "1.0.93"
quote = "1.0.38"
serde = { version = "1.0.217", features = ["derive"] }
serde_json.workspace = true
serde_urlencoded = "0.7.1"
syn = { version = "2.0.96", features = ["full"] }
tracing = "0.1.41"
tracing-subscriber = { version = "0.3.19", features = ["env-filter"] }
validator = { version = "0.20.0", features = ["derive"] }

[dev-dependencies]
tracing-subscriber = { version = "0.3.19", features = ["env-filter"] }
# The test fixtures depend on by-types/by-axum/rest-api versions that were
# removed from the workspace before being published, so pin the last
# workspace state.
by-axum = { git = "https://github.com/biyard/rust-sdk.git", rev = "fdb8ab49bd08fd9ff263fe11381038c6d45d4ef9" }
by-types = { git = "https://github.com/biyard/rust-sdk.git", rev = "fdb8ab49bd08fd9ff263fe11381038c6d45d4ef9" }
rest-api = { git = "https://github.com/biyard/rust-sdk.git", rev = "fdb8ab49bd08fd9ff263fe11381038c6d45d4ef9" }
reqwest = "0.13"
schemars.workspace = true
tokio = { version = "1.43.0", features = ["full"] }
sqlx = { version = "0.8.3", features = ["sqlite", "postgres", "runtime-tokio", "bigdecimal"] }
lazy_static = "1.5.0"
regex = "1.11.1"

[features]
server = []
