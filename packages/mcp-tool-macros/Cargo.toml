[package]
name = "mcp-tool-macros"
version = "0.1.0"
edition = "2024"
description = "#[mcp_tool] attribute: turn an axum handler into an inventory-registered MCP tool."
license = "Apache-2.0"
repository = "https://github.com/biyard/rust-sdk/tree/main/packages/mcp-tool-macros"

[lib]
proc-macro = true

[dependencies]
proc-macro2 = "1"
quote = "1"
syn = { version = "2", features = ["full", "extra-traits"] }
convert_case = "0.7"

[dev-dependencies]
mcp-tool = { path = "../mcp-tool" }
axum = { version = "0.8", features = ["http1", "tokio"] }
inventory = "0.3"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
rmcp = { version = "1.8", features = ["server", "macros", "schemars"] }
tower = { version = "0.5", features = ["util"] }
